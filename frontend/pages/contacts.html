<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Contacts — SafeHer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo"><span class="logo-icon">⚡</span><span class="logo-text">SafeHer</span></a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="report.html">Report</a>
      <a href="resources.html">Resources</a>
      <a href="contacts.html" class="active">Contacts</a>
    </div>
    <div class="nav-actions"><a href="sos.html" class="btn-sos" style="padding:9px 20px;font-size:0.85rem;">🚨 SOS</a></div>
  </nav>
  <div class="page-wrapper" style="flex-direction:column;gap:40px;max-width:900px;margin:auto;">
    <div style="text-align:center;padding-top:40px;">
      <h1 style="font-family:var(--font-display);font-size:2.5rem;font-weight:900;margin-bottom:10px;">👥 Trusted Contacts</h1>
      <p style="color:var(--muted);">These contacts will be notified instantly when you trigger an SOS alert.</p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;width:100%;">
      <!-- Add Contact Form -->
      <div class="form-card" style="height:fit-content;">
        <div class="form-title" style="font-size:1.4rem;">Add Contact</div>
        <div class="form-subtitle">Add someone you trust</div>
        <div id="alert-box"></div>
        <form id="contact-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="contact_name" placeholder="Contact's name" required />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="contact_phone" placeholder="+91 9876543210" required />
          </div>
          <div class="form-group">
            <label>Relationship</label>
            <select id="relationship" required>
              <option value="">Select...</option>
              <option value="mother">Mother</option>
              <option value="father">Father</option>
              <option value="sister">Sister</option>
              <option value="brother">Brother</option>
              <option value="friend">Friend</option>
              <option value="partner">Partner</option>
              <option value="colleague">Colleague</option>
              <option value="other">Other</option>
            </select>
          </div>
          <button type="submit" class="btn-primary btn-full">Add Contact</button>
        </form>
      </div>
      <!-- Contacts List -->
      <div>
        <h2 style="font-family:var(--font-display);font-size:1.3rem;margin-bottom:20px;">My Safety Circle</h2>
        <div id="contacts-list">
          <p style="color:var(--muted);text-align:center;padding:40px;">Loading contacts...</p>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/main.js"></script>
</body>
</html>
