<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — SafeHer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo"><span class="logo-icon">⚡</span><span class="logo-text">SafeHer</span></a>
  </nav>
  <div class="page-wrapper">
    <div class="form-card">
      <div class="form-title">Welcome Back</div>
      <div class="form-subtitle">Login to access your safety dashboard</div>
      <div id="alert-box"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Your password" required />
        </div>
        <button type="submit" class="btn-primary btn-full">Login</button>
      </form>
      <div class="form-footer">Don't have an account? <a href="register.html">Register</a></div>
    </div>
  </div>
  <script src="../js/main.js"></script>
</body>
</html>
