<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOS Emergency — SafeHer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo"><span class="logo-icon">⚡</span><span class="logo-text">SafeHer</span></a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="report.html">Report</a>
      <a href="contacts.html">Contacts</a>
    </div>
  </nav>
  <div class="sos-wrapper">
    <div>
      <h1 style="font-family:var(--font-display);font-size:clamp(2rem,4vw,3.5rem);font-weight:900;text-align:center;margin-bottom:10px;">Emergency SOS</h1>
      <p style="color:var(--muted);text-align:center;max-width:400px;">Press the button to instantly alert your trusted contacts and share your live location.</p>
    </div>
    <div class="sos-btn-wrap">
      <div class="sos-ring sos-ring-1"></div>
      <div class="sos-ring sos-ring-2"></div>
      <div class="sos-ring sos-ring-3"></div>
      <button class="sos-big-btn" id="sos-main-btn" onclick="triggerSOS()">
        🚨
        <span>SOS</span>
      </button>
    </div>
    <div class="sos-info">
      <p id="sos-status" style="font-size:1.1rem;text-align:center;min-height:30px;color:var(--rose);font-weight:500;">Press to send emergency alert</p>
      <div id="sos-time" class="hidden" style="text-align:center;margin-top:16px;">
        <p style="color:var(--muted);font-size:0.9rem;">Alert sent at: <strong id="sos-timestamp"></strong></p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:600px;width:100%;">
      <a href="tel:112" class="btn-danger" style="border-radius:12px;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;">📞 112<br><small>Emergency</small></a>
      <a href="tel:1091" class="btn-danger" style="border-radius:12px;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;">📞 1091<br><small>Women Helpline</small></a>
      <a href="tel:181" class="btn-danger" style="border-radius:12px;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;">📞 181<br><small>Domestic Violence</small></a>
    </div>
  </div>
  <script src="../js/main.js"></script>
  <script>
    document.getElementById('sos-main-btn').addEventListener('click', () => {
      const ts = document.getElementById('sos-timestamp');
      if (ts) ts.textContent = new Date().toLocaleTimeString();
      document.getElementById('sos-time')?.classList.remove('hidden');
    });
  </script>
</body>
</html>
