<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — SafeHer</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <nav class="navbar">
    <a href="../index.html" class="nav-logo"><span class="logo-icon">⚡</span><span class="logo-text">SafeHer</span></a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="report.html">Report</a>
      <a href="resources.html">Resources</a>
    </div>
    <div class="nav-actions">
      <a href="login.html" class="btn-outline">Login</a>
    </div>
  </nav>
  <div class="page-wrapper">
    <div class="form-card">
      <div class="form-title">Create Account</div>
      <div class="form-subtitle">Join SafeHer and stay protected 24/7</div>
      <div id="alert-box"></div>
      <form id="register-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 9876543210" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Create a strong password" required />
        </div>
        <button type="submit" class="btn-primary btn-full">Create Account</button>
      </form>
      <div class="form-footer">Already have an account? <a href="login.html">Login here</a></div>
    </div>
  </div>
  <script src="../js/main.js"></script>
</body>
</html>
